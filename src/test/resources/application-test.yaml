spring:
  datasource:
    url: jdbc:h2:mem:conservation-requests;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  security:
    user:
      password: test

  docker:
    compose:
      enabled: false

app:
  security:
    jwt-secret: test-jwt-secret
  encryption:
    key: test-encryption-key
