databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: Luigi
      changes:
        - createTable:
            tableName: request
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_request
                    nullable: false
              - column:
                  name: external_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: document_type
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE

        - addUniqueConstraint:
            tableName: request
            columnNames: producer_id, external_id
            constraintName: uk_request_producer_external

        - createTable:
            tableName: document
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_document
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
              - column:
                  name: mime_type
                  type: VARCHAR(255)
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: hash
                  type: VARCHAR(255)
              - column:
                  name: document_date
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: request_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: document
            baseColumnNames: request_id
            referencedTableName: request
            referencedColumnNames: id
            constraintName: fk_document_request
