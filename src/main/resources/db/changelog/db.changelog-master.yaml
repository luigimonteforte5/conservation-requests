## Index only: every changeset lives in its own file under changes/, listed here in the order it must be
## applied. Explicit includes rather than includeAll, so the order is stated instead of inherited from
## however the filesystem happens to sort the directory.
databaseChangeLog:
  - include:
      file: changes/001-initial-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: changes/002-request-not-null-constraints.yaml
      relativeToChangelogFile: true
  - include:
      file: changes/003-document-not-null-constraints.yaml
      relativeToChangelogFile: true
  - include:
      file: changes/004-request-status-history.yaml
      relativeToChangelogFile: true
