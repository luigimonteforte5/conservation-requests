databaseChangeLog:
  - changeSet:
      id: 004-request-status-history
      author: Luigi
      changes:
        - createTable:
            tableName: request_status_history
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_request_status_history
                    nullable: false
              - column:
                  name: request_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: from_status
                  type: VARCHAR(255)
              - column:
                  name: to_status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: changed_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: request_status_history
            baseColumnNames: request_id
            referencedTableName: request
            referencedColumnNames: id
            constraintName: fk_request_status_history_request

        # Postgres does not index a foreign-key column on its own; without this, reading a request's history
        # (findByRequest_Id...) and the FK check on a request delete would scan the whole audit table as it grows.
        - createIndex:
            tableName: request_status_history
            indexName: idx_request_status_history_request_id
            columns:
              - column:
                  name: request_id
